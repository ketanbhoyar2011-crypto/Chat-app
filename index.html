<!DOCTYPE html>
<html>
<head>
  <title>Chat With Ketan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* SCREEN */
    .screen {
      position: absolute;
      width: 100%;
      height: 100vh;
      transition: 0.5s;
    }

    .hidden {
      transform: translateX(100%);
      opacity: 0;
    }

    /* CHAT LIST */
    #listScreen {
      padding: 15px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px;
      margin: 10px 0;
      background: #1e293b;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .chat-item:hover {
      transform: scale(1.03);
      background: #334155;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 10px;
    }

    /* CHAT SCREEN */
    #chatScreen {
      background: #020617;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 15px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 12px;
      max-width: 70%;
      animation: pop 0.3s ease;
    }

    .me {
      background: #ef4444;
      align-self: flex-end;
    }

    .other {
      background: #1e293b;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #ef4444;
      border: none;
      border-radius: 10px;
      color: white;
    }

    /* ANIMATIONS */
    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

  </style>
</head>

<body>

<!-- CHAT LIST -->
<div id="listScreen" class="screen">
  <h2>Messages</h2>

  <div class="chat-item" onclick="openChat()">
    <div class="avatar"></div>
    <div>
      <b>Global Chat</b><br>
      <small>Tap to open</small>
    </div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="screen hidden">
  <header>
    <button onclick="back()">⬅</button>
    Global Chat
  </header>

  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Type message">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let currentUser = localStorage.getItem("user") || "User";

// SCREEN ANIMATION
function openChat(){
  document.getElementById("listScreen").classList.add("hidden");
  document.getElementById("chatScreen").classList.remove("hidden");
}

function back(){
  document.getElementById("chatScreen").classList.add("hidden");
  document.getElementById("listScreen").classList.remove("hidden");
}

// MESSAGE UI (demo animation)
function sendMessage(){
  let msg = document.getElementById("msg").value;
  if(msg.trim()=="") return;

  let div = document.createElement("div");
  div.className = "msg me";
  div.innerText = msg;

  document.getElementById("messages").appendChild(div);
  document.getElementById("msg").value = "";

  setTimeout(()=>{
    let bot = document.createElement("div");
    bot.className = "msg other";
    bot.innerText = "Nice message 😎";
    document.getElementById("messages").appendChild(bot);
  },800);
}
</script>

</body>
</html>
