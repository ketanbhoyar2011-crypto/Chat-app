<!DOCTYPE html>
<html>
<head>
  <title>Chat With Ketan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial; }

    /* LOGIN */
    #loginPage {
      height:100vh;
      background: linear-gradient(135deg,#000,#8B0000);
      display:flex;
      justify-content:center;
      align-items:center;
      animation: fadeIn 1s ease;
    }

    .login-box {
      background: rgba(0,0,0,0.8);
      padding:25px;
      border-radius:10px;
      width:90%;
      max-width:350px;
      color:white;
      text-align:center;
      animation: slideUp 0.8s ease;
    }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      outline:none;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:15px;
      background:red;
      border:none;
      color:white;
      font-size:16px;
    }

    /* CHAT */
    #chatPage {
      display:none;
      height:100vh;
      display:flex;
      flex-direction:column;
      background:#ece5dd;
      animation: fadeIn 0.5s ease;
    }

    header {
      background:black;
      color:red;
      padding:12px;
      display:flex;
      justify-content:space-between;
    }

    #messages {
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
    }

    .msg {
      padding:10px;
      margin:6px;
      border-radius:10px;
      max-width:75%;
      animation: pop 0.3s ease;
    }

    .me {
      background:red;
      color:white;
      align-self:flex-end;
    }

    .other {
      background:white;
      align-self:flex-start;
    }

    .time {
      font-size:10px;
      opacity:0.6;
    }

    #inputBox {
      display:flex;
      padding:5px;
      background:#ddd;
    }

    #inputBox input {
      flex:1;
    }

    /* DESKTOP FIX */
    @media(min-width:768px){
      body {
        display:flex;
        justify-content:center;
        background:#111;
      }

      #chatPage {
        max-width:500px;
        width:100%;
        height:95vh;
        margin-top:10px;
        border-radius:10px;
        overflow:hidden;
      }
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity:0; }
      to { opacity:1; }
    }

    @keyframes slideUp {
      from { transform:translateY(50px); opacity:0; }
      to { transform:translateY(0); opacity:1; }
    }

    @keyframes pop {
      from { transform:scale(0.8); opacity:0; }
      to { transform:scale(1); opacity:1; }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>💬 Chat With Ketan</h2>
    <input id="username" placeholder="Enter name">
    <label><input type="checkbox" id="remember"> Remember me</label>
    <button onclick="login()">LOGIN</button>
  </div>
</div>

<!-- CHAT -->
<div id="chatPage">
  <header>
    🌍 Global Chat
    <button onclick="logout()" style="width:auto;background:black;color:red;">Logout</button>
  </header>

  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCfOOaJoq6hwDQm-V85wdAVYrqqPN_32_c",
  authDomain: "chat-app-24be4.firebaseapp.com",
  databaseURL: "https://chat-app-24be4-default-rtdb.firebaseio.com",
  projectId: "chat-app-24be4",
  storageBucket: "chat-app-24be4.firebasestorage.app",
  messagingSenderId: "493367863067",
  appId: "1:493367863067:web:1b31247bf6da38284a15be",
  measurementId: "G-NVGX5N797X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser="";

// AUTO LOGIN FIX
window.onload=function(){
  let saved=localStorage.getItem("user");
  if(saved){
    currentUser=saved;
    openChat();
  }
};

// LOGIN FIX
function login(){
  let name=document.getElementById("username").value;
  let remember=document.getElementById("remember").checked;

  if(name.trim()==""){
    alert("Enter name");
    return;
  }

  currentUser=name;

  if(remember){
    localStorage.setItem("user",name);
  }

  openChat();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function openChat(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("chatPage").style.display="flex";
}

// SEND
function sendMessage(){
  let msg=document.getElementById("msg").value;

  if(msg.trim()=="") return;

  db.ref("globalChat").push({
    text:msg,
    user:currentUser,
    time:new Date().toLocaleTimeString()
  });

  document.getElementById("msg").value="";
}

// RECEIVE FIX (REALTIME UI)
db.ref("globalChat").on("value",snapshot=>{
  let box=document.getElementById("messages");
  box.innerHTML="";

  snapshot.forEach(child=>{
    let data=child.val();
    let cls=data.user===currentUser?"msg me":"msg other";

    let div=document.createElement("div");
    div.className=cls;
    div.innerHTML=`<b>${data.user}</b><br>${data.text}<div class="time">${data.time}</div>`;

    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
});
</script>

</body>
</html>
